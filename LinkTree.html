<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffeef2; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            max-width: 400px;
            width: 100%;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            text-align: center;
        }

        
        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff85a2;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            color: #d81b60;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 1rem;
            color: #ff5c8d;
            font-weight: 400;
            margin-bottom: 20px;
        }

        h3 {
            font-size: 1.1rem;
            color: #333;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
        }

       
        ul {
            list-style: none;
            margin-top: 25px;
        }

        li {
            margin-bottom: 15px;
        }

        a {
            display: block;
            background-color: #ff85a2;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        a:hover {
            background-color: #d81b60;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="۶ৎ ANGEL _𝟑.jfif" alt="angel from chainsawman">
        
        <h1>Cibelly Eduarda</h1>
        <h2>Futura Engenheira de Dados!</h2>
        
        <h3>Sobre mim:</h3>
        <p>Olá, me chamo Cibelly Eduarda, sou estudante de Análise e Desenvolvimento de Sistemas.</p>
        <p>Tenho 18 anos, sou apaixonada por tecnologia e dados.</p>
        
        <ul> 
            <li><a href="https://github.com/flimace" target="_blank">GitHub</a></li>
            <li><a href="https://www.linkedin.com/in/cibelly-eduarda-9b1a4b1b7/" target="_blank">LinkedIn</a></li>
        </ul>
    </div>

</body>
</html>
